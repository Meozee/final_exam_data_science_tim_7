{% extends "fedst7_app/base.html" %}
{% block content %}
<h2>Predict Final Grade</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Predict</button>
</form>

{% if prediction %}
<h3 style="color: green;">Predicted Final Grade: {{ prediction }}</h3>
{% endif %}
{% endblock %}
