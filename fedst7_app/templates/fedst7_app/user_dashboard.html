{% extends 'fedst7_app/base.html' %}

{% block content %}
<h2>🧑‍🎓 Dashboard Pengguna</h2>

<p class="lead">Pilih use case dan model yang ingin kamu uji:</p>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="use_case">Use Case:</label>
        <select name="use_case" class="form-control">
            {% for case in use_cases %}
                <option value="{{ case.id }}">{{ case.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label for="model">Model:</label>
        <select name="model" class="form-control">
            {% for model in models %}
                <option value="{{ model.id }}">{{ model.name }}</option>
            {% endfor %}
        </select>
    </div>

    <button type="submit" class="btn btn-success">Lanjut ke Prediksi</button>
</form>
{% endblock %}
